name: SpotiFLAC Auto-Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/spotiflac
  UPSTREAM_REPO: afkarxyz/SpotiFLAC
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Latest Upstream Version
        id: upstream
        run: |
          TAG=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest | jq -r .tag_name)
          if [ "$TAG" = "null" ] || [ -z "$TAG" ]; then TAG="main"; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.upstream.outputs.tag }}
          build-args: |
            SPOTIFLAC_VERSION=${{ steps.upstream.outputs.tag }}

      # === NEW STEP: CREATE THE GITHUB RELEASE ===
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.upstream.outputs.tag }}
          name: SpotiFLAC ${{ steps.upstream.outputs.tag }}
          body: |
            Automated Native Docker build for SpotiFLAC version ${{ steps.upstream.outputs.tag }}.
            
            **Image:** `ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.upstream.outputs.tag }}`
            
            *This release was automatically generated by the sync-build workflow.*
          draft: false
          prerelease: false
