name: SpotiFLAC Auto-Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch:      # Allows manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/spotiflac
  UPSTREAM_REPO: afkarxyz/SpotiFLAC
  # Fixes the Node.js 20 deprecation warning from your logs
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Latest Upstream Version
        id: upstream
        run: |
          VERSION=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest | jq -r .tag_name)
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest SpotiFLAC version found: $VERSION"

      - name: Check if Version Exists in Registry
        id: check
        run: |
          # Check if the specific version tag already exists in your GitHub Packages
          TOKEN=$(echo ${{ secrets.GITHUB_TOKEN }} | base64)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://ghcr.io/v2/${{ env.IMAGE_NAME }}/manifests/${{ steps.upstream.outputs.tag }})
          
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.upstream.outputs.tag }} already exists. Skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New version detected. Starting build..."
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        if: steps.check.outputs.exists == 'false'
        # Updated to v6 to fully support the Node 24 environment
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.upstream.outputs.tag }}
          build-args: |
            SPOTIFLAC_VERSION=${{ steps.upstream.outputs.tag }}
